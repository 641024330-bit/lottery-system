<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">年会抽奖 - 大屏端</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== 全局 ===== */
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
  background: var(--bg-color, #0f0f23); color: #fff; overflow: hidden;
  height: 100vh; display: flex; flex-direction: column;
  background-size: cover; background-position: center;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, color-mix(in srgb, var(--primary, #ffd700) 3%, transparent) 0%, transparent 60%),
              rgba(0,0,0,var(--bg-overlay, 0.6));
  pointer-events: none; z-index: 0;
}
.header, .main, .settings-btn, .bgm-bar, .bottom-bar { position: relative; z-index: 1; }

/* ===== Header ===== */
.header {
  padding: 14px 32px; display: flex; align-items: center; flex-shrink: 0;
  background: rgba(0,0,0,.3); backdrop-filter: blur(12px);
  border-bottom: 1px solid color-mix(in srgb, var(--primary, #ffd700) 8%, transparent);
}
.header h1 {
  font-size: 24px; font-weight: 800; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--primary, #ffd700), color-mix(in srgb, var(--primary, #ffd700) 50%, #fff));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-right: auto;
}
.header .info { display: flex; gap: 24px; font-size: 13px; }
.header .info span { color: rgba(255,255,255,.4); display: flex; align-items: center; gap: 4px; }
.header .info strong { color: var(--primary, #ffd700); font-weight: 700; }

/* ===== 主体 ===== */
.main { flex: 1; display: flex; overflow: hidden; }
.left { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; position: relative; overflow: hidden; }
.right {
  width: 320px; background: rgba(0,0,0,.25); padding: 16px;
  display: flex; flex-direction: column;
  border-left: 1px solid rgba(255,255,255,.04); backdrop-filter: blur(8px);
}

/* ===== 奖品Tab ===== */
.prize-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; flex-shrink: 0; }
.prize-tab {
  padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px;
  background: rgba(255,255,255,.04); color: rgba(255,255,255,.4); text-align: center;
  border: 1px solid transparent; transition: all .25s ease;
  position: relative; overflow: hidden;
}
.prize-tab:hover { border-color: color-mix(in srgb, var(--primary, #ffd700) 20%, transparent); color: rgba(255,255,255,.6); }
.prize-tab.active {
  background: color-mix(in srgb, var(--primary, #ffd700) 12%, transparent);
  border-color: color-mix(in srgb, var(--primary, #ffd700) 30%, transparent);
  color: var(--primary, #ffd700);
}
.prize-tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px;
  background: var(--primary, #ffd700); border-radius: 2px;
}
.prize-tab .c { font-size: 11px; opacity: .4; display: block; margin-top: 1px; }
.prize-tab.active .c { opacity: .6; }

/* ===== 抽奖区 ===== */
.draw-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; position: relative;
}
.prize-label {
  font-size: 14px; color: rgba(255,255,255,.25); letter-spacing: 3px;
  margin-bottom: 4px; flex-shrink: 0;
}
.prize-name {
  font-size: 40px; font-weight: 800; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary, #ffd700), color-mix(in srgb, var(--primary, #ffd700) 60%, #fff));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}

/* ===== ROLL ===== */
.roll-box {
  width: 50%; max-width: 520px; height: 140px; display: none;
  border: 1px solid color-mix(in srgb, var(--primary, #ffd700) 15%, transparent);
  border-radius: 16px; overflow: hidden; position: relative;
  background: rgba(0,0,0,.4); backdrop-filter: blur(12px);
  box-shadow: inset 0 0 60px rgba(0,0,0,.4), 0 8px 32px rgba(0,0,0,.3);
}
.roll-box::before, .roll-box::after {
  content: ''; position: absolute; left: 0; right: 0; height: 30px; z-index: 2; pointer-events: none;
}
.roll-box::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent); }
.roll-box::after { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,.6), transparent); }
.anim-roll .roll-box { display: block; }
.roll-track { position: absolute; left: 0; right: 0; }
.roll-item {
  height: 140px; display: flex; align-items: center; justify-content: center;
  font-size: 60px; font-weight: 800; color: #fff;
}
.roll-item.winner {
  color: var(--primary, #ffd700);
  animation: wf .5s ease-in-out 3;
  text-shadow: 0 0 40px color-mix(in srgb, var(--primary, #ffd700) 40%, transparent);
}
@keyframes wf {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

/* ===== CARD ===== */
.card-area {
  display: none; flex-wrap: wrap; justify-content: center; gap: 12px;
  perspective: 1200px; z-index: 1; padding: 20px;
}
.anim-card .card-area { display: flex; }
.card-el {
  width: 150px; height: 200px; position: relative; cursor: default;
  transform-style: preserve-3d; transition: transform .5s cubic-bezier(.22,1,.36,1);
  border-radius: 14px;
}
.card-el .card-face {
  position: absolute; inset: 0; border-radius: 14px;
  backface-visibility: hidden; display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; border: 1px solid;
  padding: 12px; text-align: center;
}
.card-el .card-back {
  background: linear-gradient(145deg, color-mix(in srgb, var(--primary, #ffd700) 80%, #1a1a2e), color-mix(in srgb, var(--primary, #ffd700) 30%, #1a1a2e));
  border-color: color-mix(in srgb, var(--primary, #ffd700) 30%, transparent);
  transform: rotateY(0deg); font-size: 36px;
}
.card-el .card-front {
  background: rgba(0,0,0,.6); border-color: color-mix(in srgb, var(--primary, #ffd700) 20%, transparent);
  transform: rotateY(180deg); color: #fff; font-size: 20px;
  backdrop-filter: blur(8px);
}
.card-el.flipped { transform: rotateY(180deg); }
.card-el.winner-card .card-front {
  color: var(--primary, #ffd700); font-size: 24px;
  box-shadow: 0 0 30px color-mix(in srgb, var(--primary, #ffd700) 20%, transparent);
}
.card-el.shuffling { animation: cardShuffle .12s ease-in-out infinite alternate; }
@keyframes cardShuffle {
  0% { transform: translateY(0) rotateY(0deg) scale(1); }
  100% { transform: translateY(-6px) rotateY(15deg) scale(1.02); }
}
.card-el.zoom-winner { animation: cardZoom .6s ease forwards; z-index: 10; }
@keyframes cardZoom {
  0% { transform: rotateY(180deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.25); box-shadow: 0 0 80px color-mix(in srgb, var(--primary, #ffd700) 40%, transparent); }
  100% { transform: rotateY(180deg) scale(1.4); box-shadow: 0 0 120px color-mix(in srgb, var(--primary, #ffd700) 30%, transparent); }
}

/* ===== SLOT ===== */
.slot-area {
  display: none; gap: 8px; justify-content: center; z-index: 1; width: 100%;
}
.anim-slot .slot-area { display: flex; }
.slot-col {
  width: 180px; height: 220px; overflow: hidden; position: relative;
  border: 1px solid color-mix(in srgb, var(--primary, #ffd700) 15%, transparent);
  border-radius: 16px;
  background: rgba(0,0,0,.4); backdrop-filter: blur(8px);
  box-shadow: inset 0 0 40px rgba(0,0,0,.3);
}
.slot-col::before, .slot-col::after {
  content: ''; position: absolute; left: 0; right: 0; height: 40px; z-index: 2; pointer-events: none;
}
.slot-col::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,.7), transparent); }
.slot-col::after { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,.7), transparent); }
.slot-track { position: absolute; left: 0; right: 0; }
.slot-item { height: 220px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; }
.slot-col .slot-highlight {
  position: absolute; left: 0; right: 0; height: 220px; top: 50%;
  transform: translateY(-110px); z-index: 1; pointer-events: none;
  background: color-mix(in srgb, var(--primary, #ffd700) 6%, transparent);
  border-top: 2px solid color-mix(in srgb, var(--primary, #ffd700) 30%, transparent);
  border-bottom: 2px solid color-mix(in srgb, var(--primary, #ffd700) 30%, transparent);
}

/* ===== HIGHLIGHT ===== */
.highlight-area {
  display: none; position: relative; width: 100%; height: 400px;
  z-index: 1; overflow: hidden;
}
.anim-highlight .highlight-area { display: block; }
.hl-tag {
  position: absolute; padding: 10px 22px; border-radius: 10px;
  font-size: 16px; font-weight: 600;
  border: 1px solid rgba(255,255,255,.06);
  background: rgba(255,255,255,.04);
  transition: all .3s ease;
  white-space: nowrap; cursor: default; user-select: none; backdrop-filter: blur(4px);
}
.hl-tag.hl-winner {
  border-color: var(--primary, #ffd700); background: var(--primary, #ffd700);
  color: #1a1a2e; font-size: 52px; z-index: 5;
  box-shadow: 0 0 100px color-mix(in srgb, var(--primary, #ffd700) 40%, transparent);
  animation: hlPulse .4s ease-in-out 4;
}
@keyframes hlPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* ===== 按钮 ===== */
.actions { z-index: 1; margin-top: 16px; display: flex; gap: 12px; flex-shrink: 0; }
.btn-draw, .btn-reset {
  padding: 14px 48px; border: none; border-radius: 12px;
  cursor: pointer; font-weight: 800; letter-spacing: 3px; font-size: 18px;
  transition: all .25s cubic-bezier(.22,1,.36,1); position: relative; overflow: hidden;
}
.btn-draw {
  background: linear-gradient(135deg, var(--primary, #ffd700), color-mix(in srgb, var(--primary, #ffd700) 70%, #000));
  color: #1a1a2e;
}
.btn-draw::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 35%, rgba(255,255,255,.15) 45%, transparent 55%);
  transform: translateX(-100%); transition: .6s;
}
.btn-draw:hover::after { transform: translateX(100%); }
.btn-draw:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 40px color-mix(in srgb, var(--primary, #ffd700) 30%, transparent); }
.btn-draw:active:not(:disabled) { transform: translateY(0) scale(.98); }
.btn-draw:disabled { opacity: .25; cursor: not-allowed; }
.btn-reset {
  background: rgba(255,255,255,.06); color: rgba(255,255,255,.5);
  border: 1px solid rgba(255,255,255,.06);
}
.btn-reset:hover { background: rgba(255,255,255,.1); color: #fff; }

/* ===== 右侧 ===== */
.qr-box {
  text-align: center; padding: 12px;
  background: rgba(0,0,0,.3); border-radius: 12px;
  margin-bottom: 12px; flex-shrink: 0;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.04);
}
.qr-box img { width: 160px; height: 160px; display: block; margin: 0 auto; object-fit: contain; }
.qr-hint { font-size: 12px; color: rgba(255,255,255,.3); margin-top: 6px; }

.section-title {
  font-size: 12px; color: rgba(255,255,255,.3);
  margin-bottom: 8px; display: flex; justify-content: space-between;
  letter-spacing: 2px; flex-shrink: 0;
}
.participant-list { flex: 1; overflow-y: auto; min-height: 0; }
.participant-list::-webkit-scrollbar { width: 3px; }
.participant-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 3px; }
.p-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 8px; font-size: 12px;
  background: rgba(255,255,255,.02); margin-bottom: 2px;
  transition: .2s;
}
.p-item .phone { color: rgba(255,255,255,.2); font-size: 11px; margin-left: auto; }
.p-item.won {
  background: color-mix(in srgb, var(--primary, #ffd700) 6%, transparent);
  border: 1px solid color-mix(in srgb, var(--primary, #ffd700) 10%, transparent);
}
.p-item .p-avatar {
  width: 24px; height: 24px; border-radius: 50%; object-fit: cover;
  border: 1px solid rgba(255,255,255,.05); flex-shrink: 0;
}
.p-item .p-avatar-placeholder {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: color-mix(in srgb, var(--primary, #ffd700) 15%, transparent);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; border: 1px solid rgba(255,255,255,.05);
}

/* ===== 中奖弹窗 ===== */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.8); z-index: 999;
  align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.overlay.show { display: flex; }
.winner-modal {
  background: linear-gradient(145deg, #1a1a3e, #2a1a3e);
  border: 1px solid color-mix(in srgb, var(--primary, #ffd700) 25%, transparent);
  border-radius: 28px; padding: 48px 60px;
  text-align: center; animation: mi .5s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 0 100px color-mix(in srgb, var(--primary, #ffd700) 10%, transparent);
  max-width: 90vw;
}
@keyframes mi {
  0% { transform: scale(.7) translateY(30px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.winner-modal h2 { font-size: 28px; color: var(--primary, #ffd700); margin-bottom: 4px; font-weight: 800; }
.winner-modal .modal-prize { font-size: 14px; color: rgba(255,255,255,.3); margin-bottom: 16px; }
.winner-modal .names { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
.winner-modal .name-item {
  font-size: 56px; font-weight: 800; color: #fff; padding: 8px 24px;
  animation: ni .4s ease both;
}
.winner-modal .name-item:nth-child(2) { animation-delay: .15s; }
.winner-modal .name-item:nth-child(3) { animation-delay: .3s; }
.winner-modal .name-item:nth-child(4) { animation-delay: .45s; }
.winner-modal .name-item:nth-child(5) { animation-delay: .6s; }
@keyframes ni {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.winner-modal .btn-close {
  margin-top: 24px; padding: 12px 40px; border-radius: 10px;
  background: var(--primary, #ffd700); color: #1a1a2e; border: none;
  font-size: 16px; cursor: pointer; font-weight: 700;
  transition: .2s;
}
.winner-modal .btn-close:hover { transform: translateY(-2px); box-shadow: 0 8px 24px color-mix(in srgb, var(--primary, #ffd700) 25%, transparent); }

/* ===== 中奖名单 ===== */
.winner-section { margin-top: auto; border-top: 1px solid rgba(255,255,255,.04); padding-top: 8px; flex-shrink: 0; }
.wtags { display: flex; flex-wrap: wrap; gap: 3px; max-height: 60px; overflow-y: auto; }
.wtag {
  font-size: 10px; padding: 3px 8px;
  background: color-mix(in srgb, var(--primary, #ffd700) 8%, transparent);
  border-radius: 8px; color: var(--primary, #ffd700);
}

/* ===== BGM ===== */
.bgm-bar {
  position: fixed; bottom: 20px; right: 20px; z-index: 50;
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,.5); backdrop-filter: blur(12px);
  padding: 8px 16px; border-radius: 24px;
  border: 1px solid rgba(255,255,255,.06);
}
.bgm-bar.hidden { display: none; }
.bgm-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: var(--primary, #ffd700); color: #1a1a2e;
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: .2s;
}
.bgm-btn:hover { transform: scale(1.1); }
.bgm-label { font-size: 11px; color: rgba(255,255,255,.3); }

/* ===== 批量选择器 ===== */
.draw-count-selector {
  display: none; z-index: 1; margin-bottom: 8px;
}
.draw-count-selector.show { display: flex; align-items: center; gap: 8px; }
.draw-count-selector label { font-size: 12px; color: rgba(255,255,255,.3); }
.draw-count-selector select {
  padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.05); color: #fff; font-size: 14px; outline: none;
}

/* ===== Confetti ===== */
.confetti-container {
  position: fixed; inset: 0; z-index: 998; pointer-events: none; overflow: hidden;
}
.confetti {
  position: absolute; width: 8px; height: 8px; top: -10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(.3); opacity: 0; }
}

/* ===== 设置面板 ===== */
.settings-btn {
  position: fixed; top: 14px; right: 20px; z-index: 10;
  padding: 6px 14px; background: rgba(255,255,255,.04); color: rgba(255,255,255,.3);
  border: 1px solid rgba(255,255,255,.06); border-radius: 8px; cursor: pointer; font-size: 12px;
  transition: .2s; backdrop-filter: blur(4px);
}
.settings-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
.settings-panel {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.settings-panel.show { display: flex; }
.settings-content {
  background: #16213e; border-radius: 20px; padding: 32px; width: 90%; max-width: 500px;
  max-height: 80vh; overflow-y: auto;
  border: 1px solid rgba(255,255,255,.06);
}
.settings-content h2 { color: var(--primary, #ffd700); font-size: 20px; margin-bottom: 16px; }
.settings-content .form-group { margin-bottom: 14px; }
.settings-content label { display: block; font-size: 12px; color: rgba(255,255,255,.4); margin-bottom: 4px; }
.settings-content input, .settings-content select {
  width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.05); color: #fff; font-size: 14px; outline: none;
}
.settings-content input:focus { border-color: var(--primary, #ffd700); }
.settings-content .btn-save {
  padding: 10px 30px; background: var(--primary, #ffd700); color: #1a1a2e; border: none;
  border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: .2s;
}
.settings-content .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 20px color-mix(in srgb, var(--primary, #ffd700) 20%, transparent); }
.prize-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.prize-item input { flex: 1; }
.prize-item input[type=number] { width: 70px; flex: none; }
.prize-item .del { padding: 4px 10px; background: rgba(255,71,87,.15); color: #ff4757; border: none; border-radius: 4px; cursor: pointer; }
.add-prize { padding: 6px 16px; background: color-mix(in srgb, var(--primary, #ffd700) 8%, transparent); color: var(--primary, #ffd700); border: 1px dashed color-mix(in srgb, var(--primary, #ffd700) 20%, transparent); border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 4px; }

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .right { width: 220px; padding: 12px; }
  .roll-box { width: 80%; height: 100px; }
  .roll-item { height: 100px; font-size: 36px; }
  .prize-name { font-size: 28px; }
  .winner-modal { padding: 32px; }
  .winner-modal .name-item { font-size: 36px; }
  .card-el { width: 110px; height: 150px; }
  .card-el .card-face { font-size: 14px; }
  .slot-col { width: 130px; height: 180px; }
  .slot-item { height: 180px; font-size: 24px; }
  .header h1 { font-size: 18px; letter-spacing: 3px; }
}
</style>
</head>
<body>

<div class="confetti-container" id="confettiContainer"></div>

<div class="header">
  <h1 id="titleText">🎯 年会抽奖</h1>
  <div class="info">
    <span>👥 参与者 <strong id="participantTotal">0</strong></span>
    <span>🏆 已中奖 <strong id="winnerTotal">0</strong></span>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙ 设置</button>
</div>

<div class="main">
  <div class="left">
    <div class="prize-tabs" id="prizeTabs"></div>

    <div class="draw-count-selector" id="drawCountSelector">
      <label>本次抽取</label>
      <select id="drawCountInput">
        <option value="1">1 人</option>
        <option value="2">2 人</option>
        <option value="3">3 人</option>
        <option value="5">5 人</option>
        <option value="10">10 人</option>
      </select>
    </div>

    <div class="draw-area">
      <div class="prize-label" id="prizeLabel">当前奖项</div>
      <div class="prize-name" id="currentPrize">未设置</div>

      <div class="roll-box" id="rollBox">
        <div class="roll-track" id="rollTrack"></div>
      </div>

      <div class="card-area" id="cardArea"></div>

      <div class="slot-area" id="slotArea">
        <div class="slot-col" id="slotCol0"><div class="slot-track" id="slotTrack0"></div><div class="slot-highlight"></div></div>
        <div class="slot-col" id="slotCol1"><div class="slot-track" id="slotTrack1"></div><div class="slot-highlight"></div></div>
        <div class="slot-col" id="slotCol2"><div class="slot-track" id="slotTrack2"></div><div class="slot-highlight"></div></div>
      </div>

      <div class="highlight-area" id="hlArea"></div>

      <div class="actions">
        <button class="btn-draw" id="btnDraw" onclick="toggleDraw()">开始抽奖</button>
        <button class="btn-reset" onclick="resetAll()">🔄 重置</button>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="qr-box">
      <img id="qrImg" src="/api/qrcode.png" alt="QR Code">
      <div class="qr-hint">📱 微信扫码参与抽奖</div>
    </div>

    <div class="section-title">
      <span>📋 参与者</span>
      <span id="listCount">0</span>
    </div>
    <div class="participant-list" id="participantList">
      <div style="text-align:center;color:rgba(255,255,255,.08);margin-top:40px;font-size:13px;">暂无参与者<br>等待扫码加入...</div>
    </div>

    <div class="winner-section">
      <div class="section-title">🏆 中奖名单</div>
      <div class="wtags" id="winnerTags"><span style="color:rgba(255,255,255,.1);font-size:11px;">暂无</span></div>
    </div>
  </div>
</div>

<div class="bgm-bar hidden" id="bgmBar">
  <button class="bgm-btn" id="bgmBtn" onclick="toggleBgm()">▶</button>
  <span class="bgm-label">BGM</span>
</div>

<div class="overlay" id="winnerOverlay">
  <div class="winner-modal">
    <h2>🎉 恭喜中奖</h2>
    <div class="modal-prize" id="modalPrize"></div>
    <div class="names" id="modalNames"></div>
    <button class="btn-close" onclick="closeModal()">确 定</button>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-content">
    <h2>⚙ 奖项设置</h2>
    <div id="settingsPrizeList"></div>
    <button class="add-prize" onclick="addPrize()">+ 添加奖项</button>
    <br><br>
    <button class="btn-save" onclick="saveSettings()">保存设置</button>
    <button style="margin-left:8px;padding:10px 30px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:none;border-radius:8px;font-size:16px;cursor:pointer;" onclick="toggleSettings()">取消</button>
    <br><br>
    <div style="border-top:1px solid rgba(255,255,255,.04);padding-top:14px;">
      <button onclick="resetAll()" style="padding:8px 20px;background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.15);border-radius:6px;cursor:pointer;font-size:13px;">🗑 重置所有抽奖数据</button>
    </div>
  </div>
</div>

<script>
const API = '';
let state = { prizes: [], currentIdx: 0, isRolling: false, timer: null, pollTimer: null };
let tempPrizes = [];
let settings = {};
let bgmAudio = null;
let animState = {};

// ===== Confetti =====
function fireConfetti() {
  const c = document.getElementById('confettiContainer');
  const colors = ['#ffd700','#ff4757','#2ed573','#1e90ff','#ff6b81','#a29bfe','#fd79a8','#00cec9'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `left:${Math.random()*100}%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1}s`;
    c.appendChild(el);
  }
  setTimeout(() => c.innerHTML = '', 5000);
}

// ===== 加载设置 =====
async function loadSettings() {
  try {
    const r = await fetch(`${API}/api/settings`).then(r => r.json());
    if (r.success) { settings = r.data; applySettings(r.data); }
  } catch(e) {}
}

function applySettings(s) {
  const root = document.documentElement;
  root.style.setProperty('--primary', s.primaryColor || '#ffd700');
  root.style.setProperty('--bg-color', s.bgColor || '#0f0f23');
  root.style.setProperty('--bg-overlay', s.bgOverlay ?? 0.6);
  if (s.bgType === 'image' && s.bgImage) {
    document.body.style.backgroundImage = `url(${s.bgImage})`;
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.style.backgroundColor = s.bgColor || '#0f0f23';
  }
  if (s.title) {
    document.getElementById('titleText').textContent = '🎯 ' + s.title;
    document.getElementById('pageTitle').textContent = s.title + ' - 大屏端';
  }
  document.body.classList.remove('anim-roll', 'anim-card', 'anim-slot', 'anim-highlight');
  document.body.classList.add('anim-' + (s.animationStyle || 'roll'));
  const hint = document.querySelector('.qr-hint');
  hint.textContent = s.joinMethod === 'wechat' ? '📱 微信扫码授权参与' : '📱 微信扫码参与抽奖';
  const dSel = document.getElementById('drawCountSelector');
  if (s.drawMode === 'batch') dSel.classList.add('show');
  else dSel.classList.remove('show');
  setupBgm(s);
}

// ===== BGM =====
function setupBgm(s) {
  const bar = document.getElementById('bgmBar');
  if (s.bgmUrl && s.bgmEnabled !== false) {
    bar.classList.remove('hidden');
    if (!bgmAudio || bgmAudio.src !== s.bgmUrl) {
      if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
      bgmAudio = new Audio(s.bgmUrl);
      bgmAudio.loop = true;
      bgmAudio.volume = 0.3;
      bgmAudio.addEventListener('ended', () => { document.getElementById('bgmBtn').textContent = '▶'; });
    }
  } else { bar.classList.add('hidden'); if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; } }
}
function toggleBgm() {
  if (!bgmAudio) return;
  if (bgmAudio.paused) { bgmAudio.play().catch(()=>{}); document.getElementById('bgmBtn').textContent = '⏸'; }
  else { bgmAudio.pause(); document.getElementById('bgmBtn').textContent = '▶'; }
}
function tryPlayBgm() {
  if (bgmAudio && bgmAudio.paused && settings.bgmEnabled !== false) {
    bgmAudio.play().catch(()=>{}); document.getElementById('bgmBtn').textContent = '⏸';
  }
}
function stopBgm() { if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; } document.getElementById('bgmBtn').textContent = '▶'; }

// ===== 初始化 =====
async function init() {
  await loadSettings();
  fetch(`${API}/api/qrcode`).then(r=>r.json()).then(r=>{
    if(r.success) {
      if (r.isCustom || settings.qrImage) {
        document.getElementById('qrImg').src = r.qrcode;
        document.querySelector('.qr-hint').textContent = '📱 扫码参与抽奖';
      }
    }
  });
  await loadPrizes();
  renderPrizes();
  startPolling();
  document.addEventListener('keydown', e => {
    if ((e.key === ' ' || e.key === 'Enter') && !document.getElementById('winnerOverlay').classList.contains('show')) {
      e.preventDefault(); toggleDraw();
    }
  });
}
init();

function startPolling() { pollData(); state.pollTimer = setInterval(pollData, 2000); }

// ===== 奖项 =====
async function loadPrizes() {
  const r = await fetch(`${API}/api/prizes`).then(r => r.json());
  if (r.success) state.prizes = r.data;
}
function renderPrizes() {
  const p = state.prizes;
  if (!p.length) return;
  const tabEl = document.getElementById('prizeTabs');
  tabEl.innerHTML = p.map((p, i) => `
    <div class="prize-tab ${i === state.currentIdx ? 'active' : ''}" onclick="switchPrize(${i})">
      ${p.name} <span class="c">${p.winners.length}/${p.count}</span>
    </div>
  `).join('');
  document.getElementById('currentPrize').textContent = p[state.currentIdx]?.name || '';
  updateBtn();
}
function switchPrize(i) { if (state.isRolling) return; state.currentIdx = i; renderPrizes(); }
function updateBtn() {
  const p = state.prizes[state.currentIdx];
  const btn = document.getElementById('btnDraw');
  if (!p) { btn.disabled = true; btn.textContent = '无奖项'; return; }
  const r = p.count - p.winners.length;
  if (r <= 0) { btn.disabled = true; btn.textContent = '已抽完 ✓'; }
  else { btn.disabled = false; btn.textContent = '开始抽奖'; }
}

// ===== 数据轮询 =====
async function pollData() {
  const [pr, wr] = await Promise.all([
    fetch(`${API}/api/participants`).then(r=>r.json()),
    fetch(`${API}/api/winners`).then(r=>r.json()),
  ]);
  if (pr.success) {
    document.getElementById('participantTotal').textContent = pr.total;
    document.getElementById('listCount').textContent = pr.total;

    const allWonIds = new Set();
    state.prizes.forEach(p => p.winners.forEach(w => allWonIds.add(w.id)));

    const el = document.getElementById('participantList');
    if (!pr.data.length) {
      el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.08);margin-top:40px;font-size:13px;">暂无参与者<br>等待扫码加入...</div>';
    } else {
      el.innerHTML = pr.data.map(p => `
        <div class="p-item ${allWonIds.has(p.id) ? 'won' : ''}">
          ${p.avatar
            ? `<img class="p-avatar" src="${p.avatar}" onerror="this.style.display='none'">`
            : `<div class="p-avatar-placeholder">${p.nickname[0]}</div>`
          }
          <span>${p.nickname}</span>
          <span class="phone">${p.phone ? p.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : ''}</span>
          ${allWonIds.has(p.id) ? '<span style="font-size:11px;color:var(--primary);">🏆</span>' : ''}
        </div>
      `).join('');
    }

    const tags = document.getElementById('winnerTags');
    if (wr.success) {
      const items = wr.data.flatMap(p => p.winners.map(w => ({ prize: p.name, name: w.nickname })));
      document.getElementById('winnerTotal').textContent = items.length;
      if (!items.length) tags.innerHTML = '<span style="color:rgba(255,255,255,.1);font-size:11px;">暂无</span>';
      else tags.innerHTML = items.map(i => `<span class="wtag">${i.prize}: ${i.name}</span>`).join('');
    }
  }
}

// ===== 抽奖主控 =====
function toggleDraw() {
  if (state.isRolling) stopRoll();
  else startRoll();
}
function getDrawCount() { return parseInt(document.getElementById('drawCountInput').value) || 1; }

function startRoll() {
  const p = state.prizes[state.currentIdx];
  if (!p || p.winners.length >= p.count) return;
  fetch(`${API}/api/participants`).then(r=>r.json()).then(r => {
    if (!r.success || !r.data.length) { alert('暂无参与者'); return; }
    const allWonIds = new Set();
    state.prizes.forEach(pr => pr.winners.forEach(w => allWonIds.add(w.id)));
    const av = r.data.filter(d => !allWonIds.has(d.id));
    if (!av.length) { alert('所有人都已中奖！'); return; }
    state.isRolling = true;
    document.getElementById('btnDraw').textContent = '停！';
    tryPlayBgm();
    const anim = settings.animationStyle || 'roll';
    if (anim === 'roll') startRollAnim(av);
    else if (anim === 'card') startCardAnim(av);
    else if (anim === 'slot') startSlotAnim(av);
    else if (anim === 'highlight') startHighlightAnim(av);
  });
}

function stopRoll() {
  clearInterval(state.timer); state.isRolling = false;
  const p = state.prizes[state.currentIdx];
  if (!p) return;
  const anim = settings.animationStyle || 'roll';
  if (anim === 'roll') stopRollAnim(p);
  else if (anim === 'card') stopCardAnim(p);
  else if (anim === 'slot') stopSlotAnim(p);
  else if (anim === 'highlight') stopHighlightAnim(p);
}

// ===== ROLL =====
function startRollAnim(av) {
  const track = document.getElementById('rollTrack');
  const h = document.getElementById('rollBox').clientHeight || 140;
  const items = [];
  for (let i = 0; i < 50; i++) items.push(av[i % av.length].nickname);
  track.innerHTML = items.map(n => `<div class="roll-item">${n}</div>`).join('');
  track.style.transform = 'translateY(0px)';
  let pos = 0;
  state.timer = setInterval(() => { pos -= 2; if (Math.abs(pos) >= h) pos = 0; track.style.transform = `translateY(${pos}px)`; }, 50);
}
function stopRollAnim(prize) {
  executeDraw(prize).then(winners => {
    if (!winners.length) { document.getElementById('btnDraw').textContent = '开始抽奖'; return; }
    document.querySelectorAll('.roll-item').forEach(el => {
      if (winners.some(w => el.textContent.trim() === w.nickname)) el.classList.add('winner');
    });
    fireConfetti();
    setTimeout(() => showWinnerModal(prize.name, winners), 800);
  });
}

// ===== CARD =====
function startCardAnim(av) {
  const area = document.getElementById('cardArea');
  const cards = av.slice(0, Math.min(12, av.length));
  const count = getDrawCount();
  cards.forEach((c, i) => c._isWinner = i < count);
  animState.cardWinners = cards.filter(c => c._isWinner);
  area.innerHTML = cards.map((c, i) => `
    <div class="card-el shuffling" data-idx="${i}">
      <div class="card-face card-back">?</div>
      <div class="card-face card-front">${c.nickname}</div>
    </div>
  `).join('');
  animState.cardEls = area.querySelectorAll('.card-el');
  let shuffleCount = 0;
  const maxShuffles = 15 + Math.floor(Math.random() * 10);
  state.timer = setInterval(() => {
    shuffleCount++;
    const grid = area.querySelectorAll('.card-el');
    for (let s = 0; s < 3; s++) {
      const ai = Math.floor(Math.random() * grid.length);
      let bi = Math.floor(Math.random() * grid.length);
      if (ai === bi) bi = (ai + 1) % grid.length;
      [grid[ai].style.order, grid[bi].style.order] = [grid[bi].style.order || 0, grid[ai].style.order || 0];
    }
    if (shuffleCount >= maxShuffles) {
      clearInterval(state.timer); state.timer = null;
      document.getElementById('btnDraw').click();
    }
  }, 200);
}
function stopCardAnim(prize) {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  executeDraw(prize, animState.cardWinners ? undefined : getDrawCount()).then(winners => {
    if (!winners.length) { document.getElementById('btnDraw').textContent = '开始抽奖'; return; }
    const names = new Set(winners.map(w => w.nickname));
    document.querySelectorAll('.card-el').forEach(el => {
      el.classList.remove('shuffling');
      const front = el.querySelector('.card-front');
      if (front && names.has(front.textContent.trim())) {
        el.classList.add('flipped', 'winner-card');
        setTimeout(() => el.classList.add('zoom-winner'), 400);
      } else {
        setTimeout(() => el.classList.add('flipped'), 200 + Math.random() * 600);
      }
    });
    fireConfetti();
    setTimeout(() => showWinnerModal(prize.name, winners), 1800);
  });
}

// ===== SLOT =====
function startSlotAnim(av) {
  [0, 1, 2].forEach(ci => {
    const track = document.getElementById('slotTrack' + ci);
    const items = [];
    for (let i = 0; i < 30; i++) items.push(av[i % av.length].nickname);
    track.innerHTML = items.map(n => `<div class="slot-item">${n}</div>`).join('');
    track.style.transform = 'translateY(0px)';
  });
  const speeds = [1.5, 2.5, 3.5];
  const pos = [0, 0, 0];
  const h = 220;
  animState.slot = { pos, speeds, started: Date.now(), stopped: [false, false, false] };
  state.timer = setInterval(() => {
    const el = (Date.now() - animState.slot.started) / 1000;
    [0, 1, 2].forEach(ci => {
      if (animState.slot.stopped[ci]) return;
      const stopTime = 1.0 + ci * 0.6;
      if (el > stopTime) {
        animState.slot.speeds[ci] = Math.max(0.1, animState.slot.speeds[ci] - 0.03);
        if (animState.slot.speeds[ci] <= 0.15) { animState.slot.stopped[ci] = true; return; }
      }
      animState.slot.pos[ci] -= animState.slot.speeds[ci];
      if (Math.abs(animState.slot.pos[ci]) >= h) animState.slot.pos[ci] = 0;
      document.getElementById('slotTrack' + ci).style.transform = `translateY(${animState.slot.pos[ci]}px)`;
    });
    if (animState.slot.stopped.every(Boolean)) {
      clearInterval(state.timer); state.timer = null;
      document.getElementById('btnDraw').click();
    }
  }, 30);
}
function stopSlotAnim(prize) {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  executeDraw(prize).then(winners => {
    if (!winners.length) { document.getElementById('btnDraw').textContent = '开始抽奖'; return; }
    const w = winners[0];
    [0, 1, 2].forEach(ci => {
      const track = document.getElementById('slotTrack' + ci);
      track.innerHTML = `<div class="slot-item" style="color:var(--primary,#ffd700);font-size:40px;animation:wf .5s ease-in-out 3;">${w.nickname}</div>`;
      track.style.transform = 'translateY(0px)';
    });
    fireConfetti();
    setTimeout(() => showWinnerModal(prize.name, winners), 1000);
  });
}

// ===== HIGHLIGHT =====
function startHighlightAnim(av) {
  const area = document.getElementById('hlArea');
  const count = Math.min(av.length, 40);
  area.innerHTML = av.slice(0, count).map((p, i) => {
    const x = Math.random() * 80 + 5;
    const y = Math.random() * 70 + 5;
    const speed = 0.5 + Math.random() * 1.5;
    const dx = (Math.random() > 0.5 ? 1 : -1) * speed;
    const dy = (Math.random() > 0.5 ? 1 : -1) * speed;
    return `<div class="hl-tag" data-idx="${i}" data-x="${x}" data-y="${y}" data-dx="${dx}" data-dy="${dy}" style="left:${x}%;top:${y}%;">${p.nickname}</div>`;
  }).join('');
  animState.hlTags = area.querySelectorAll('.hl-tag');
  let frame = 0;
  state.timer = setInterval(() => {
    frame++;
    animState.hlTags.forEach(el => {
      let x = parseFloat(el.dataset.x) + parseFloat(el.dataset.dx) * 0.2;
      let y = parseFloat(el.dataset.y) + parseFloat(el.dataset.dy) * 0.2;
      if (x < 2 || x > 78) el.dataset.dx = -parseFloat(el.dataset.dx);
      if (y < 2 || y > 62) el.dataset.dy = -parseFloat(el.dataset.dy);
      x = Math.max(2, Math.min(78, x)); y = Math.max(2, Math.min(62, y));
      el.dataset.x = x; el.dataset.y = y;
      el.style.left = x + '%'; el.style.top = y + '%';
      if (frame % 10 === 0) el.style.borderColor = Math.random() > 0.5 ? 'var(--primary, #ffd700)' : 'rgba(255,255,255,.1)';
    });
    if (frame > 150) { clearInterval(state.timer); state.timer = null; document.getElementById('btnDraw').click(); }
  }, 30);
}
function stopHighlightAnim(prize) {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  executeDraw(prize).then(winners => {
    if (!winners.length) { document.getElementById('btnDraw').textContent = '开始抽奖'; return; }
    const names = new Set(winners.map(w => w.nickname));
    animState.hlTags.forEach(el => {
      if (names.has(el.textContent.trim())) el.classList.add('hl-winner');
      else { el.style.opacity = '0.08'; el.style.transition = 'opacity 2s ease'; }
    });
    fireConfetti();
    setTimeout(() => showWinnerModal(prize.name, winners), 1200);
  });
}

// ===== 执行抽奖 =====
async function executeDraw(prize, countOverride) {
  const count = countOverride || (settings.drawMode === 'batch' ? getDrawCount() : 1);
  try {
    const r = await fetch(`${API}/api/draw`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prizeName: prize.name, count }),
    }).then(r => r.json());
    if (!r.success) { alert(r.message); document.getElementById('btnDraw').textContent = '开始抽奖'; return []; }
    if (r.winners.length) { setTimeout(async () => { await loadPrizes(); renderPrizes(); }, 500); return r.winners; }
    return [];
  } catch(e) { document.getElementById('btnDraw').textContent = '开始抽奖'; return []; }
}

// ===== 中奖弹窗 =====
function showWinnerModal(prizeName, winners) {
  document.getElementById('modalPrize').textContent = `🏆 ${prizeName}`;
  document.getElementById('modalNames').innerHTML = winners.map(w =>
    `<div class="name-item">${w.nickname}</div>`
  ).join('');
  document.getElementById('winnerOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('winnerOverlay').classList.remove('show');
  document.getElementById('btnDraw').textContent = '开始抽奖';
}

// ===== 设置 =====
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  if (panel.classList.contains('show')) { panel.classList.remove('show'); }
  else { tempPrizes = JSON.parse(JSON.stringify(state.prizes)); renderSettingsPrizes(); panel.classList.add('show'); }
}
function renderSettingsPrizes() {
  document.getElementById('settingsPrizeList').innerHTML = tempPrizes.map((p, i) => `
    <div class="prize-item">
      <input value="${p.name}" onchange="editPrize(${i},'name',this.value)" placeholder="奖项名称">
      <span style="color:rgba(255,255,255,.2);font-size:11px;">中奖</span>
      <input type="number" value="${p.count}" min="1" onchange="editPrize(${i},'count',parseInt(this.value)||1)">
      <span style="color:rgba(255,255,255,.2);font-size:11px;">人</span>
      <button class="del" onclick="delPrize(${i})">×</button>
    </div>`).join('');
}
function editPrize(i, k, v) { tempPrizes[i][k] = v; }
function addPrize() { tempPrizes.push({ name: '新奖项', count: 1 }); renderSettingsPrizes(); }
function delPrize(i) { if (tempPrizes.length > 1) { tempPrizes.splice(i, 1); renderSettingsPrizes(); } }
async function saveSettings() {
  const r = await fetch(`${API}/api/prizes`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prizes: tempPrizes }),
  }).then(r=>r.json());
  if (r.success) { state.prizes = r.data; if (state.currentIdx >= state.prizes.length) state.currentIdx = 0; renderPrizes(); toggleSettings(); }
}

// ===== 重置 =====
async function resetAll() {
  if (state.isRolling) { clearInterval(state.timer); state.isRolling = false; }
  if (!confirm('确定重置所有抽奖数据？')) return;
  await fetch(`${API}/api/reset`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
  stopBgm(); await loadPrizes(); renderPrizes(); toggleSettings();
}

// ===== 全屏 =====
document.querySelector('.main').addEventListener('click', e => {
  if (e.target.closest('.right') || e.target.closest('.actions') || e.target.closest('.header') || e.target.closest('.settings-btn')) return;
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
});
</script>
</body>
</html>
