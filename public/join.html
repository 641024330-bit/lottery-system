<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>参与抽奖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 16px; color: #fff; overflow: hidden;
  background: var(--bg-color, #0f0f23);
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: linear-gradient(135deg, rgba(255,215,0,.03) 0%, transparent 50%, rgba(255,215,0,.02) 100%);
  z-index: 0; animation: bgShift 8s ease-in-out infinite;
}
@keyframes bgShift {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ---- 粒子背景 ---- */
#particles {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,215,0,.15) 0%, transparent 70%);
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* ---- 主卡片 ---- */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 400px;
  background: rgba(22,33,62,.75); backdrop-filter: blur(24px) saturate(1.4);
  border-radius: 28px; padding: 40px 28px;
  border: 1px solid color-mix(in srgb, var(--primary, #ffd700) 12%, transparent);
  box-shadow: 0 24px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  text-align: center;
  transform: translateY(0); transition: transform .4s cubic-bezier(.22,1,.36,1);
  min-height: 420px;
}

.title {
  font-size: 32px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--primary, #ffd700), color-mix(in srgb, var(--primary, #ffd700) 60%, #fff));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 4px;
}
.subtitle {
  font-size: 14px; color: rgba(255,255,255,.35); margin-bottom: 28px;
  letter-spacing: 2px;
}

/* ---- 表单 ---- */
.form-group {
  margin-bottom: 18px; text-align: left;
  position: relative;
}
.form-group label {
  display: block; font-size: 12px; color: rgba(255,255,255,.35);
  margin-bottom: 6px; letter-spacing: 1px; transition: .2s;
}
.form-group:focus-within label { color: var(--primary, #ffd700); }
.form-group input {
  width: 100%; padding: 14px 16px; border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,.06); background: rgba(255,255,255,.04);
  color: #fff; font-size: 16px; outline: none;
  transition: all .25s ease;
}
.form-group input:focus {
  border-color: var(--primary, #ffd700);
  background: rgba(255,215,0,.04);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary, #ffd700) 8%, transparent);
}
.form-group input::placeholder { color: rgba(255,255,255,.15); }
.form-group input:user-invalid { border-color: #ff4757; }

/* ---- 按钮 ---- */
.btn-submit {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--primary, #ffd700), color-mix(in srgb, var(--primary, #ffd700) 70%, #000));
  color: #1a1a2e; font-size: 17px; font-weight: 800; cursor: pointer;
  transition: all .25s cubic-bezier(.22,1,.36,1);
  letter-spacing: 2px; position: relative; overflow: hidden;
}
.btn-submit::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.1) 50%, transparent 60%);
  transform: translateX(-100%); transition: .6s;
}
.btn-submit:hover::after { transform: translateX(100%); }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 40px color-mix(in srgb, var(--primary, #ffd700) 25%, transparent); }
.btn-submit:active { transform: translateY(0) scale(.98); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

.btn-wechat {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #07c160, #06ad56); color: #fff;
  font-size: 17px; font-weight: 700; cursor: pointer;
  transition: all .25s cubic-bezier(.22,1,.36,1);
  letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-wechat:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(7,193,96,.3); }
.btn-wechat:active { transform: translateY(0) scale(.98); }

/* ---- 分割线 ---- */
.divider {
  display: flex; align-items: center; gap: 12px; margin: 18px 0;
  color: rgba(255,255,255,.15); font-size: 12px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.06); }

/* ---- 成功页面 ---- */
.success {
  display: none; animation: successIn .6s cubic-bezier(.22,1,.36,1);
}
@keyframes successIn {
  0% { opacity: 0; transform: scale(.8) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.success .icon { font-size: 72px; margin-bottom: 16px; display: block; animation: bounceIn .6s cubic-bezier(.68,-.55,.27,1.55); }
@keyframes bounceIn {
  0% { transform: scale(0); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.success h2 { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #2ed573, #7bed9f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.success p { font-size: 14px; color: rgba(255,255,255,.35); line-height: 1.6; }
.success .success-name {
  margin: 16px 0; font-size: 20px; font-weight: 700;
  color: var(--primary, #ffd700);
}

/* ---- 错误提示 ---- */
.error-msg {
  display: none; padding: 12px 16px; border-radius: 12px;
  background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.2);
  color: #ff6b81; font-size: 14px; margin-bottom: 16px;
  animation: shake .4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ---- 加载状态 ---- */
.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2.5px solid rgba(0,0,0,.15); border-top-color: #1a1a2e;
  border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- 底部 ---- */
.footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,.1); letter-spacing: 1px; }

/* ---- 微信加载 ---- */
.wechat-loading { padding: 30px 0; }
.wechat-loading .pulse { font-size: 48px; margin-bottom: 12px; display: block; }
.wechat-loading .pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: .6; }
}

/* ---- Confetti ---- */
.confetti-container {
  position: fixed; inset: 0; z-index: 999; pointer-events: none; overflow: hidden;
}
.confetti {
  position: absolute; width: 8px; height: 8px; top: -10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(.3); opacity: 0; }
}

/* ---- 输入框交互动画 ---- */
.form-group .input-icon {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  font-size: 18px; opacity: .15; pointer-events: none; transition: .2s;
}
.form-group:focus-within .input-icon { opacity: .4; }

/* ---- 过渡动画 ---- */
.fade-enter { animation: fadeIn .35s ease; }
@keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }

/* ---- 响应式 ---- */
@media (max-width: 420px) {
  .card { padding: 28px 20px; border-radius: 20px; }
  .title { font-size: 26px; }
}
</style>
</head>
<body>

<div id="particles"></div>
<div class="confetti-container" id="confettiContainer"></div>

<div class="card" id="card">
  <div class="title" id="titleText">🎯 年会抽奖</div>
  <div class="subtitle" id="subtitleText">填写信息，参与现场抽奖</div>

  <!-- 微信授权加载 -->
  <div class="wechat-loading" id="wechatLoading" style="display:none;">
    <span class="pulse">⏳</span>
    <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;">正在授权...</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.3);">正在获取您的微信信息</p>
  </div>

  <!-- 表单 -->
  <div id="formArea" class="fade-enter">
    <div class="error-msg" id="errorMsg"></div>

    <div id="wechatAuthBtn" style="display:none;">
      <button class="btn-wechat" onclick="wechatLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm7 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM12 2C6.48 2 2 6.03 2 11a8.46 8.46 0 0 0 3.5 6.78l-.86 2.9 3.29-1.78A10.9 10.9 0 0 0 12 20c5.52 0 10-4.03 10-9s-4.48-9-10-9z"/></svg>
        微信一键授权参与
      </button>
      <div class="divider">或 手动填写</div>
    </div>

    <div class="form-group">
      <label>您的姓名</label>
      <input id="nickname" type="text" placeholder="请输入真实姓名" maxlength="20" autocomplete="name">
      <span class="input-icon">👤</span>
    </div>

    <div class="form-group">
      <label>手机号码</label>
      <input id="phone" type="tel" placeholder="请输入手机号" maxlength="11" inputmode="numeric" autocomplete="tel">
      <span class="input-icon">📱</span>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submitJoin()">
      立即参与抽奖
    </button>
  </div>

  <!-- 成功 -->
  <div class="success" id="successArea">
    <span class="icon">🎉</span>
    <h2>参与成功！</h2>
    <div class="success-name" id="successName"></div>
    <p>请关注大屏幕，祝您好运！</p>
    <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.2);" id="successInfo"></div>
  </div>

  <div class="footer" id="footerText">现场大屏抽奖系统</div>
</div>

<script>
const API = '';
let submitted = false;
let settings = {};

function isWeChat() { return /MicroMessenger/i.test(navigator.userAgent); }
function getParam(name) { return new URLSearchParams(window.location.search).get(name) || ''; }

// ===== 粒子背景 =====
(function initParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = 2 + Math.random() * 6;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${10+Math.random()*20}s;animation-delay:${Math.random()*15}s`;
    c.appendChild(p);
  }
})();

// ===== Confetti =====
function fireConfetti() {
  const c = document.getElementById('confettiContainer');
  const colors = ['#ffd700','#ff4757','#2ed573','#1e90ff','#ff6b81','#a29bfe','#fd79a8','#00cec9'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `left:${Math.random()*100}%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s`;
    c.appendChild(el);
  }
  setTimeout(() => c.innerHTML = '', 5000);
}

// ===== 主题 =====
async function loadSettings() {
  try {
    const r = await fetch(`${API}/api/settings`).then(r => r.json());
    if (r.success) { settings = r.data; applyTheme(r.data); }
  } catch(e) {}
}

function applyTheme(s) {
  const root = document.documentElement;
  root.style.setProperty('--primary', s.primaryColor || '#ffd700');
  root.style.setProperty('--bg-overlay', s.bgOverlay ?? 0.6);
  if (s.bgType === 'image' && s.bgImage) {
    document.body.style.backgroundImage = `url(${s.bgImage})`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
  } else {
    document.body.style.background = s.bgColor || '#0f0f23';
  }
  if (s.title) document.getElementById('titleText').textContent = '🎯 ' + s.title;
  if (s.subtitle) document.getElementById('subtitleText').textContent = s.subtitle;
  if (s.title) document.title = s.title + ' - 参与抽奖';
  document.getElementById('footerText').textContent = s.subtitle || '现场大屏抽奖系统';

  const jm = s.joinMethod || 'form';
  const wb = document.getElementById('wechatAuthBtn');
  if (jm === 'wechat' || jm === 'both') {
    wb.style.display = 'block';
    if (jm === 'wechat') {
      document.querySelectorAll('.form-group').forEach(e => e.style.display = 'none');
      document.getElementById('btnSubmit').style.display = 'none';
      document.querySelector('.divider').style.display = 'none';
    }
  } else { wb.style.display = 'none'; }
}

// ===== 微信授权 =====
function wechatLogin() {
  if (!settings.wechatAppId) { showError('微信未配置，请使用表单参与'); return; }
  const redirectUri = encodeURIComponent(window.location.origin + '/api/wechat/callback');
  window.location.href = `https://open.weixin.qq.com/connect/oauth2/authorize?appid=${settings.wechatAppId}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=join#wechat_redirect`;
}

// ===== 提交 =====
async function submitJoin() {
  if (submitted) return;
  const nickname = document.getElementById('nickname').value.trim();
  const phone = document.getElementById('phone').value.trim();
  if (!nickname) { showError('请输入您的姓名'); document.getElementById('nickname').focus(); return; }
  if (!phone) { showError('请输入手机号'); document.getElementById('phone').focus(); return; }
  if (!/^1\d{10}$/.test(phone)) { showError('手机号格式不正确'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交中...';
  hideError();

  try {
    const r = await fetch(`${API}/api/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, phone, avatar: '', openid: '' }),
    });
    const res = await r.json();
    if (res.success) {
      submitted = true;
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successName').textContent = nickname;
      document.getElementById('successArea').style.display = 'block';
      fireConfetti();
    } else {
      showError(res.message || '参与失败');
      btn.disabled = false;
      btn.innerHTML = '立即参与抽奖';
    }
  } catch(e) {
    showError('网络错误，请稍后重试');
    btn.disabled = false;
    btn.innerHTML = '立即参与抽奖';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'shake .4s ease';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

document.addEventListener('keydown', e => { if (e.key === 'Enter') submitJoin(); });

// ===== 初始化 =====
(async function init() {
  await loadSettings();
  const auth = getParam('auth');
  const wechatParam = getParam('wechat');
  if (auth === 'success') {
    submitted = true;
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
    document.getElementById('successName').textContent = '微信用户';
    document.getElementById('successInfo').textContent = '已通过微信授权自动参与';
    fireConfetti();
    return;
  }
  if (auth === 'done') {
    submitted = true;
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
    document.getElementById('successName').textContent = '';
    document.getElementById('successInfo').textContent = '您已经参与过抽奖，请等待开奖';
    return;
  }
  if (auth === 'fail') showError('微信授权失败，请手动填写信息参与');
  if (isWeChat() && wechatParam === '1' && settings.wechatAppId && !auth) {
    document.getElementById('wechatLoading').style.display = 'block';
    document.getElementById('formArea').style.display = 'none';
    setTimeout(wechatLogin, 1000);
  }
})();
</script>
</body>
</html>
