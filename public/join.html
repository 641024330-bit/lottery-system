<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>参与抽奖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: linear-gradient(135deg, #0f0f23, #1a1a3e);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; color: #fff;
  background-size: cover; background-position: center; background-attachment: fixed;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: rgba(0,0,0,var(--bg-overlay, 0.6)); pointer-events: none; z-index: 0;
}
.card {
  position: relative; z-index: 1;
  background: rgba(22,33,62,.9); backdrop-filter: blur(20px);
  border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 400px;
  border: 1px solid color-mix(in srgb, var(--primary, #ffd700) 15%, transparent);
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  text-align: center;
}
.title {
  font-size: 28px; font-weight: bold; color: var(--primary, #ffd700); margin-bottom: 6px;
  text-shadow: 0 0 20px color-mix(in srgb, var(--primary, #ffd700) 20%, transparent);
}
.subtitle { font-size: 14px; color: rgba(255,255,255,.4); margin-bottom: 32px; }

.form-group { margin-bottom: 20px; text-align: left; }
.form-group label { display: block; font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05);
  color: #fff; font-size: 16px; outline: none; transition: .2s;
}
.form-group input:focus { border-color: var(--primary, #ffd700); }
.form-group input::placeholder { color: rgba(255,255,255,.2); }

.btn-submit {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary, #ffd700), color-mix(in srgb, var(--primary, #ffd700) 70%, #000)); color: #1a1a2e;
  font-size: 18px; font-weight: bold; cursor: pointer;
  transition: .2s; letter-spacing: 2px;
}
.btn-submit:hover { transform: scale(1.02); box-shadow: 0 8px 30px color-mix(in srgb, var(--primary, #ffd700) 30%, transparent); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.btn-wechat {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #07c160, #06ad56); color: #fff;
  font-size: 18px; font-weight: bold; cursor: pointer;
  transition: .2s; letter-spacing: 2px; margin-bottom: 12px;
}
.btn-wechat:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(7,193,96,.3); }

.divider {
  display: flex; align-items: center; gap: 12px; margin: 16px 0;
  color: rgba(255,255,255,.2); font-size: 12px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08); }

.success {
  display: none; padding: 40px 0;
}
.success .icon { font-size: 64px; margin-bottom: 16px; }
.success h2 { font-size: 24px; color: #2ed573; margin-bottom: 8px; }
.success p { font-size: 14px; color: rgba(255,255,255,.4); }

.error-msg {
  display: none; padding: 12px; border-radius: 10px;
  background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.3);
  color: #ff6b81; font-size: 14px; margin-bottom: 16px;
}

.loading { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.wechat-loading { padding: 40px 0; }
.wechat-loading .icon { font-size: 48px; margin-bottom: 16px; }
.wechat-loading h2 { font-size: 20px; margin-bottom: 8px; }
.wechat-loading p { font-size: 13px; color: rgba(255,255,255,.3); }

.footer { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.15); }

/* 装饰 */
.deco { position: fixed; pointer-events: none; opacity: .03; font-size: 200px; z-index: 0; }
.deco-1 { top: -50px; left: -50px; }
.deco-2 { bottom: -80px; right: -50px; }
</style>
</head>
<body>
<div class="deco deco-1">🎯</div>
<div class="deco deco-2">🏆</div>

<div class="card">
  <div class="title" id="titleText">🎯 年会抽奖</div>
  <div class="subtitle" id="subtitleText">填写信息，参与现场抽奖</div>

  <!-- 微信授权加载 -->
  <div class="wechat-loading" id="wechatLoading" style="display:none;">
    <div class="icon">⏳</div>
    <h2>正在授权...</h2>
    <p>正在获取您的微信信息，请稍候</p>
  </div>

  <!-- 表单 -->
  <div id="formArea">
    <div class="error-msg" id="errorMsg"></div>

    <!-- 微信一键授权按钮 -->
    <div id="wechatAuthBtn" style="display:none;">
      <button class="btn-wechat" onclick="wechatLogin()">
        💬 微信一键授权参与
      </button>
      <div class="divider">或 手动填写</div>
    </div>

    <div class="form-group">
      <label>您的姓名</label>
      <input id="nickname" type="text" placeholder="请输入真实姓名" maxlength="20" autocomplete="name">
    </div>

    <div class="form-group">
      <label>手机号码</label>
      <input id="phone" type="tel" placeholder="请输入手机号" maxlength="11" inputmode="numeric" autocomplete="tel">
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submitJoin()">
      立即参与抽奖
    </button>
  </div>

  <!-- 成功 -->
  <div class="success" id="successArea">
    <div class="icon">🎉</div>
    <h2>参与成功！</h2>
    <p>请等待大屏抽奖，祝您好运！</p>
    <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.2);" id="successInfo"></div>
  </div>

  <div class="footer" id="footerText">现场大屏抽奖系统</div>
</div>

<script>
const API = '';
let submitted = false;
let settings = {};

// ===== 检测微信浏览器 =====
function isWeChat() { return /MicroMessenger/i.test(navigator.userAgent); }

// ===== 获取URL参数 =====
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name) || '';
}

// ===== 加载设置 =====
async function loadSettings() {
  try {
    const r = await fetch(`${API}/api/settings`).then(r => r.json());
    if (r.success) {
      settings = r.data;
      applyTheme(r.data);
    }
  } catch(e) {}
}

function applyTheme(s) {
  const root = document.documentElement;
  const primary = s.primaryColor || '#ffd700';
  const bgColor = s.bgColor || '#0f0f23';
  const overlay = s.bgOverlay ?? 0.6;

  root.style.setProperty('--primary', primary);
  root.style.setProperty('--bg-overlay', overlay);

  if (s.bgType === 'image' && s.bgImage) {
    document.body.style.backgroundImage = `url(${s.bgImage})`;
    document.body.style.backgroundColor = 'transparent';
  } else {
    document.body.style.background = bgColor;
  }

  if (s.title) document.getElementById('titleText').textContent = '🎯 ' + s.title;
  if (s.subtitle) document.getElementById('subtitleText').textContent = s.subtitle;
  if (s.title) document.title = s.title + ' - 参与抽奖';
  document.getElementById('footerText').textContent = s.subtitle || '现场大屏抽奖系统';

  // Show/hide WeChat button based on join method
  const joinMethod = s.joinMethod || 'form';
  const wechatBtn = document.getElementById('wechatAuthBtn');
  if (joinMethod === 'wechat' || joinMethod === 'both') {
    wechatBtn.style.display = 'block';
    if (joinMethod === 'wechat') {
      // 仅微信模式：隐藏表单字段，直接显示微信按钮
      document.querySelectorAll('.form-group').forEach(el => el.style.display = 'none');
      document.getElementById('btnSubmit').style.display = 'none';
      document.querySelector('.divider').style.display = 'none';
    }
  } else {
    wechatBtn.style.display = 'none';
  }
}

// ===== 微信授权 =====
function wechatLogin() {
  const appId = settings.wechatAppId;
  if (!appId) {
    showError('微信未配置，请使用表单参与');
    return;
  }
  // 构建OAuth URL
  const redirectUri = encodeURIComponent(window.location.origin + '/api/wechat/callback');
  const state = 'join';
  const oauthUrl = `https://open.weixin.qq.com/connect/oauth2/authorize?appid=${appId}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=${state}#wechat_redirect`;
  window.location.href = oauthUrl;
}

// ===== 初始化 =====
async function init() {
  await loadSettings();

  const auth = getParam('auth');
  const wechatParam = getParam('wechat');

  if (auth === 'success') {
    // 微信授权成功回调
    submitted = true;
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
    document.getElementById('successInfo').textContent = '已通过微信授权自动参与';
    return;
  }

  if (auth === 'done') {
    // 已经参与过
    submitted = true;
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
    document.getElementById('successInfo').textContent = '您已经参与过抽奖，请等待开奖';
    return;
  }

  if (auth === 'fail') {
    showError('微信授权失败，请手动填写信息参与');
  }

  // 微信内自动触发授权
  if (isWeChat() && wechatParam === '1' && settings.wechatAppId && !auth) {
    // 自动跳转微信授权
    document.getElementById('wechatLoading').style.display = 'block';
    document.getElementById('formArea').style.display = 'none';
    setTimeout(wechatLogin, 1000);
  }
}

// ===== 参与抽奖 =====
async function submitJoin() {
  if (submitted) return;
  const nickname = document.getElementById('nickname').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if (!nickname) { showError('请输入您的姓名'); return; }
  if (!phone) { showError('请输入手机号'); return; }
  if (!/^1\d{10}$/.test(phone)) { showError('手机号格式不正确'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> 提交中...';
  hideError();

  try {
    const r = await fetch(`${API}/api/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, phone, avatar: '', openid: '' }),
    });
    const res = await r.json();

    if (res.success) {
      submitted = true;
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successArea').style.display = 'block';
    } else {
      showError(res.message || '参与失败');
      btn.disabled = false;
      btn.innerHTML = '立即参与抽奖';
    }
  } catch(e) {
    showError('网络错误，请稍后重试');
    btn.disabled = false;
    btn.innerHTML = '立即参与抽奖';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

// 回车提交
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitJoin();
});

init();
</script>
</body>
</html>
