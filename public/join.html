<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>参与抽奖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: linear-gradient(135deg, #0f0f23, #1a1a3e);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; color: #fff;
}
.card {
  background: rgba(22,33,62,.9); backdrop-filter: blur(20px);
  border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 400px;
  border: 1px solid rgba(255,215,0,.15);
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  text-align: center;
}
.title {
  font-size: 28px; font-weight: bold; color: #ffd700; margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(255,215,0,.2);
}
.subtitle { font-size: 14px; color: rgba(255,255,255,.4); margin-bottom: 32px; }

.form-group { margin-bottom: 20px; text-align: left; }
.form-group label { display: block; font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05);
  color: #fff; font-size: 16px; outline: none; transition: .2s;
}
.form-group input:focus { border-color: #ffd700; }
.form-group input::placeholder { color: rgba(255,255,255,.2); }

.btn-submit {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #ffd700, #ffa500); color: #1a1a2e;
  font-size: 18px; font-weight: bold; cursor: pointer;
  transition: .2s; letter-spacing: 2px;
}
.btn-submit:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(255,215,0,.3); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.success {
  display: none; padding: 40px 0;
}
.success .icon { font-size: 64px; margin-bottom: 16px; }
.success h2 { font-size: 24px; color: #2ed573; margin-bottom: 8px; }
.success p { font-size: 14px; color: rgba(255,255,255,.4); }

.error-msg {
  display: none; padding: 12px; border-radius: 10px;
  background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.3);
  color: #ff6b81; font-size: 14px; margin-bottom: 16px;
}

.loading { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.15); }

/* 装饰 */
.deco { position: fixed; pointer-events: none; opacity: .03; font-size: 200px; }
.deco-1 { top: -50px; left: -50px; }
.deco-2 { bottom: -80px; right: -50px; }
</style>
</head>
<body>
<div class="deco deco-1">🎯</div>
<div class="deco deco-2">🏆</div>

<div class="card">
  <div class="title">🎯 年会抽奖</div>
  <div class="subtitle">填写信息，参与现场抽奖</div>

  <!-- 表单 -->
  <div id="formArea">
    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>您的姓名</label>
      <input id="nickname" type="text" placeholder="请输入真实姓名" maxlength="20" autocomplete="name">
    </div>

    <div class="form-group">
      <label>手机号码</label>
      <input id="phone" type="tel" placeholder="请输入手机号" maxlength="11" inputmode="numeric" autocomplete="tel">
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submitJoin()">
      立即参与抽奖
    </button>
  </div>

  <!-- 成功 -->
  <div class="success" id="successArea">
    <div class="icon">🎉</div>
    <h2>参与成功！</h2>
    <p>请等待大屏抽奖，祝您好运！</p>
  </div>

  <div class="footer">现场大屏抽奖系统</div>
</div>

<script>
const API = '';
let submitted = false;

// 检测是否在微信中
function isWeChat() { return /MicroMessenger/i.test(navigator.userAgent); }

// 微信授权（如果有配置）
async function wechatAuth() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('code')) return params.get('code');
  if (isWeChat()) {
    // 尝试从meta获取appid
    // 实际oauth需要后端配合，先走简单模式
  }
  return null;
}

// 参与抽奖
async function submitJoin() {
  if (submitted) return;
  const nickname = document.getElementById('nickname').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if (!nickname) { showError('请输入您的姓名'); return; }
  if (!phone) { showError('请输入手机号'); return; }
  if (!/^1\d{10}$/.test(phone)) { showError('手机号格式不正确'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> 提交中...';
  hideError();

  // 获取微信code（如果在微信中）
  let openid = '';
  const params = new URLSearchParams(window.location.search);

  try {
    const r = await fetch(`${API}/api/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, phone, avatar: '', openid }),
    });
    const res = await r.json();

    if (res.success) {
      submitted = true;
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successArea').style.display = 'block';
    } else {
      showError(res.message || '参与失败');
      btn.disabled = false;
      btn.innerHTML = '立即参与抽奖';
    }
  } catch(e) {
    showError('网络错误，请稍后重试');
    btn.disabled = false;
    btn.innerHTML = '立即参与抽奖';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

// 回车提交
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitJoin();
});
</script>
</body>
</html>
